<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unison Community Dashboard</title>
  <meta name="description" content="Live member dashboard for the Unison Community Discord server">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 背景 -->
  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- 导航 -->
  <nav>
    <div class="container">
      <div class="nav-logo">
        <div class="logo-mark">U</div>
        <span id="nav-name">Loading...</span>
      </div>
      <div class="nav-actions">
        <button class="nav-btn active" id="bot-btn" title="Toggle bots">
          <i class="fa-solid fa-robot"></i> <span class="hide-sm">Bots On</span>
        </button>
        <button class="nav-btn" id="view-btn" title="Toggle view">
          <i class="fa-solid fa-list"></i>
        </button>
        <button class="nav-btn primary" id="rand-btn" title="Random member (R)">
          <i class="fa-solid fa-shuffle"></i> <span class="hide-sm">Random</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- 加载 -->
  <div class="container" id="load">
    <div class="load-screen">
      <div class="load-spin"></div>
      <p>Loading community data...</p>
    </div>
  </div>

  <!-- 主体 -->
  <div class="container" id="app" style="display:none">

    <header class="hero">
      <div class="hero-eyebrow">Discord Server</div>
      <h1 id="hero-title">Unison Community</h1>
      <p class="hero-meta" id="hero-meta">Loading...</p>
      <p class="hero-date" id="hero-date"></p>
    </header>

    <section class="stats-row" id="stats-grid" aria-label="Statistics"></section>

    <section class="section-block" aria-label="Community vibes">
      <div class="section-head">
        <h2 class="section-title">Community Vibes</h2>
        <span class="section-badge">Live</span>
      </div>
      <div class="vibe-card" id="vibe-text"></div>
      <div class="bar-chart" id="bars"></div>
    </section>

    <section class="section-block" aria-label="Members">
      <div class="section-head">
        <h2 class="section-title">Members</h2>
      </div>
      <div class="controls">
        <div class="controls-row">
          <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search" placeholder="Search by name or username..." aria-label="Search members">
          </div>
          <span class="result-count" id="rcount"></span>
        </div>
        <div class="chip-row" id="chips" role="tablist" aria-label="Filter by role"></div>
      </div>
      <main class="members-grid" id="members-grid" aria-label="Member list"></main>
    </section>

  </div>

  <!-- 模态框 -->
  <div class="modal-bg" id="modal-bg" role="dialog" aria-modal="true">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <!-- Toast -->
  <div class="toast-area" id="toasts" aria-live="polite"></div>

  <footer>
    <div class="container">
      <p>Unison Community Dashboard &middot; Auto-loads from <code>members.json</code></p>
      <p style="margin-top:4px;opacity:0.5">
        <kbd>/</kbd> search &middot; <kbd>R</kbd> random &middot; <kbd>Esc</kbd> close
      </p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
