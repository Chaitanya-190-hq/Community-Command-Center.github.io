<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unison Community Dashboard</title>
  <meta name="description" content="Live member dashboard for the Unison Community Discord server">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%97%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <script>
    // GitHub Pages SPA base path: redirect deep links to index.html
    (function () {
      var p = window.location.pathname;
      if (p && !p.endsWith('/') && !p.match(/\.[^/]+$/)) {
        var segs = p.split('/').filter(Boolean);
        if (segs.length > 1) {
          window.location.replace(
            window.location.origin + '/' + segs.slice(0, -1).join('/') + '/?p=' + encodeURIComponent(segs.join('/'))
          );
        }
      }
    })();
  </script>
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <div class="bg-layer" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>

  <nav id="nav">
    <div class="container nav-inner">
      <div class="nav-logo">
        <div class="logo-mark">U</div>
        <span id="nav-name">Unison</span>
      </div>
      <div class="nav-actions">
        <button class="nav-btn active" id="bot-btn" title="Toggle bots" aria-pressed="true">
          <i class="fa-solid fa-robot"></i> <span class="hide-sm">Bots On</span>
        </button>
        <button class="nav-btn" id="view-btn" title="Toggle view">
          <i class="fa-solid fa-list"></i>
        </button>
        <button class="nav-btn primary" id="rand-btn" title="Random member (R)">
          <i class="fa-solid fa-shuffle"></i> <span class="hide-sm">Random</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="container" id="load">
    <div class="load-screen">
      <div class="load-orbit"><div class="load-core"></div></div>
      <p>Loading community data…</p>
    </div>
  </div>

  <div class="container" id="app" style="display:none">
    <header class="hero">
      <div class="hero-eyebrow"><span class="pulse-dot"></span> Discord Server</div>
      <h1 id="hero-title">Unison Community</h1>
      <p class="hero-meta" id="hero-meta">Loading…</p>
      <p class="hero-date" id="hero-date"></p>
    </header>

    <section class="stats-row" id="stats-grid" aria-label="Statistics"></section>

    <section class="section-block" aria-label="Community vibes">
      <div class="section-head">
        <h2 class="section-title">Community Vibes</h2>
        <span class="section-badge"><span class="pulse-dot"></span> Live</span>
      </div>
      <div class="vibe-card" id="vibe-text"></div>
      <div class="bar-chart" id="bars"></div>
    </section>

    <section class="section-block" aria-label="Members">
      <div class="section-head">
        <h2 class="section-title">Members</h2>
        <span class="section-sub" id="rcount"></span>
      </div>
      <div class="controls">
        <div class="controls-row">
          <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search" placeholder="Search by name or username…  (press /)" aria-label="Search members">
            <kbd>/</kbd>
          </div>
        </div>
        <div class="chip-row" id="chips" role="tablist" aria-label="Filter by role"></div>
      </div>
      <main class="members-grid" id="members-grid" aria-label="Member list"></main>
    </section>
  </div>

  <div class="modal-bg" id="modal-bg" role="dialog" aria-modal="true">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <div class="toast-area" id="toasts" aria-live="polite"></div>

  <footer>
    <div class="container">
      <p>Unison Community Dashboard &middot; Data from <code>members.json</code></p>
      <p style="margin-top:4px;opacity:0.55">
        <kbd>/</kbd> search &middot; <kbd>R</kbd> random &middot; <kbd>Esc</kbd> close
      </p>
    </div>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
