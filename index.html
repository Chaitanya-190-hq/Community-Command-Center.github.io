<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Community Command Center</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="loader">
    <div class="loader-box">
        <div class="spinner"></div>
        <h2>Loading Community Dashboard</h2>
        <p>Fetching analytics...</p>
    </div>
</div>

<header class="topbar">

    <div class="brand">
        <h1>Community Command Center</h1>
        <span id="serverName">Loading...</span>
    </div>

    <div class="actions">
        <button id="themeToggle">
            🌙 Theme
        </button>
    </div>

</header>

<main>

<section class="hero-grid">

    <div class="metric-card">
        <span>Total Members</span>
        <h2 id="memberCount">0</h2>
    </div>

    <div class="metric-card">
        <span>Human Members</span>
        <h2 id="humanCount">0</h2>
    </div>

    <div class="metric-card">
        <span>Bots</span>
        <h2 id="botCount">0</h2>
    </div>

    <div class="metric-card">
        <span>Total Roles</span>
        <h2 id="roleCount">0</h2>
    </div>

</section>

<section class="dashboard-grid">

    <div class="panel">
        <div class="panel-header">
            <h2>Role Distribution</h2>
        </div>

        <canvas id="roleChart"></canvas>
    </div>

    <div class="panel">

        <div class="panel-header">
            <h2>Community Insights</h2>
        </div>

        <div class="insight-list">

            <div class="insight-item">
                <span>Newest Member</span>
                <strong id="newestMember">-</strong>
            </div>

            <div class="insight-item">
                <span>Most Popular Role</span>
                <strong id="topRole">-</strong>
            </div>

            <div class="insight-item">
                <span>Export Date</span>
                <strong id="exportDate">-</strong>
            </div>

        </div>

    </div>

</section>

<section class="controls">

    <input
        type="text"
        id="searchInput"
        placeholder="Search members..."
    >

    <select id="roleFilter">
        <option value="">All Roles</option>
    </select>

</section>

<section class="directory-section">

    <div class="section-header">

        <h2>Members Directory</h2>

        <span id="visibleCount">
            0 Members
        </span>

    </div>

    <div id="memberGrid"></div>

</section>

</main>

<div id="memberModal" class="modal">

    <div class="modal-content">

        <button id="closeModal" class="close-btn">
            ×
        </button>

        <div id="modalBody"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
