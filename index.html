<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unison Community Dashboard</title>
  <meta name="description" content="Live member dashboard for the Unison Community Discord server">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 动态背景光斑 -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- 导航栏 -->
  <nav>
    <div class="container">
      <div class="nav-logo">
        <div class="logo-icon">U</div>
        <span id="server-name">Loading...</span>
      </div>
      <div class="nav-actions">
        <button class="nav-btn" id="bot-toggle" title="Toggle bot visibility">
          <i class="fa-solid fa-robot"></i> Bots On
        </button>
        <button class="nav-btn" id="view-toggle" title="Switch to list view">
          <i class="fa-solid fa-list"></i>
        </button>
        <button class="nav-btn accent-btn" id="random-btn" title="Random member (R)">
          <i class="fa-solid fa-dice"></i> Random
        </button>
      </div>
    </div>
  </nav>

  <!-- 加载状态 -->
  <div class="container" id="loading-state">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <p>Loading community data...</p>
    </div>
  </div>

  <!-- 主应用（初始隐藏） -->
  <div class="container" id="app" style="display:none">

    <!-- 英雄区 -->
    <header class="hero">
      <div class="hero-badge">
        <i class="fa-solid fa-circle"></i> Discord Server Dashboard
      </div>
      <h1 id="server-name-hero">Unison Community</h1>
      <p class="hero-sub" id="hero-count">Loading...</p>
      <p style="color:var(--fg-muted);font-size:0.78rem;margin-top:10px" id="export-date"></p>
    </header>

    <!-- 统计卡片 -->
    <section class="stats-grid" id="stats-grid" aria-label="Server statistics"></section>

    <!-- 社区氛围图 -->
    <section class="vibes-section" aria-label="Community vibes">
      <div class="section-header">
        <h2 class="section-title">Community Vibes</h2>
      </div>
      <div class="vibe-desc" id="vibe-desc"></div>
      <div class="chart-bars" id="chart-bars"></div>
    </section>

    <!-- 控制区 -->
    <section class="controls" aria-label="Member filters">
      <div class="controls-top">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-input" placeholder="Search by name or username..." aria-label="Search members">
        </div>
        <span class="results-info" id="results-info"></span>
      </div>
      <div class="filter-chips" id="filter-chips" role="tablist" aria-label="Filter by role"></div>
    </section>

    <!-- 成员网格 -->
    <main class="members-grid" id="members-grid" aria-label="Member list"></main>
  </div>

  <!-- 模态框 -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="Member details">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- 页脚 -->
  <footer>
    <div class="container">
      <p>Unison Community Dashboard &middot; Data auto-loaded from <code>members.json</code></p>
      <p style="margin-top:4px;opacity:0.6">Press <kbd style="background:var(--card);padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:0.75rem">/</kbd> to search &middot; <kbd style="background:var(--card);padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:0.75rem">R</kbd> for random &middot; <kbd style="background:var(--card);padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:0.75rem">Esc</kbd> to close</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
